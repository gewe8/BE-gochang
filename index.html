  // === Day 2: 예산 ===

    subItems:[{key:'yesan_meat',label:'신광정육점'},{key:'yesan_grill',label:'불판빌리는곳'},{key:'yesan_coffee',label:'다방면커피'},{key:'yesan_pie',label:'사과파이'}]},
  {id:'yesan_church',day:2,startH:12,startM:5,name:'예산성당',menu:'충남기념물 164호 · 근대건축',phone:'041-332-2564',hours:'외관 상시',lat:36.680,lng:126.843,mapLat:36.683,mapLng:126.843,refundable:false,type:'spot',duration:15,travelAfter:10},
  {id:'yedangho',day:2,startH:12,startM:30,name:'예당호 출렁다리',menu:'402m 현수교 · 모노레일 · 전망대',phone:'041-339-8287',hours:'월 09~20시 (무료)',lat:36.639,lng:126.802,mapLat:36.639,mapLng:126.802,refundable:false,type:'spot',duration:50,travelAfter:8},
  {id:'wisteria',day:2,startH:13,startM:28,name:'등나무꽃',menu:'예산 등나무 군락지',phone:'',hours:'상시 (4월 말 개화)',lat:36.655,lng:126.815,mapLat:36.655,mapLng:126.815,refundable:false,type:'spot',address:'예산군 오가면 신장리 450-48',duration:20,travelAfter:50},
  {id:'cheonan',day:2,startH:14,startM:38,name:'천안시외버스터미널',menu:'여행 끝!',phone:'',hours:'',lat:36.815,lng:127.156,mapLat:36.815,mapLng:127.156,refundable:false,type:'home',duration:0,travelAfter:0},
];

const TRAVEL={
  'sugung→seonunsa_d1':20,'seonunsa_d1→sugung':20,'sugung→hotel_in':25,'hotel_in→sugung':25,
  'sugung→geumdan':5,'geumdan→sugung':5,'sugung→barley':35,'barley→sugung':35,
  'seonunsa_d1→hotel_in':20,'hotel_in→seonunsa_d1':20,'seonunsa_d1→joyang':20,'joyang→seonunsa_d1':20,
  'hotel_in→joyang':5,'joyang→hotel_in':5,'hotel_in→barley':40,'barley→hotel_in':40,
  'hotel_in→geumdan':25,'geumdan→hotel_in':25,
  'hotel_in→oncheon1':0,'oncheon1→hotel_in':0,
  'joyang→geumdan':25,'geumdan→joyang':25,
  'joyang→barley':35,'barley→joyang':35,
  'barley→geumdan':25,'geumdan→barley':25,
  'geumdan→oncheon1':25,'oncheon1→geumdan':25,
  'checkout→yesan_market':90,'yesan_market→checkout':90,
  'yesan_market→yesan_church':3,'yesan_church→yesan_market':3,
  'yesan_church→yedangho':10,'yedangho→yesan_church':10,
  'yedangho→wisteria':8,'wisteria→yedangho':8,
  'wisteria→cheonan':50,'cheonan→wisteria':50,
  'yesan_market→yedangho':10,'yedangho→yesan_market':10,
  'yesan_market→wisteria':15,'wisteria→yesan_market':15,
  'yesan_church→wisteria':10,'wisteria→yesan_church':10,
  'yedangho→cheonan':55,'cheonan→yedangho':55,
  'yesan_church→cheonan':55,'cheonan→yesan_church':55,
  'yesan_market→cheonan':55,'cheonan→yesan_market':55,
};

function getTravelMin(a,b){return TRAVEL[a+'→'+b]||15;}
function recalcTimes(P){
  [1,2].forEach(d=>{const dp=P.filter(p=>p.day===d);if(!dp.length)return;
  let m=dp[0].startH*60+dp[0].startM;dp[0]._calcTime=fmt(m);dp[0]._travelBefore=null;
  for(let i=1;i<dp.length;i++){const prev=dp[i-1];m+=prev.duration+getTravelMin(prev.id,dp[i].id);dp[i]._calcTime=fmt(m);dp[i]._travelBefore=getTravelMin(prev.id,dp[i].id);}});
}
function fmt(m){const h=Math.floor(m/60),mm=m%60;return h+':'+mm.toString().padStart(2,'0');}

// === Supabase 설정 ===
const SUPABASE_URL = 'https://tarjpplltjmxsoqcxvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhcmpwcGxsdGpteHNvcWN4dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTgxNjksImV4cCI6MjA5MDQ3NDE2OX0.4vK3FQgOLObmwhqz2SWjNtKlBQvErDPQTIdJhZIebeo';
const TRIP_ID = 'gochang-yesan-2026'; // 여행별 고유 ID
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadSpending() {
  try {
    const { data, error } = await sb.from('trip_spend').select('key,value').eq('trip_id', TRIP_ID);
    if(!error && data) {
      spending = {};
      data.forEach(r => { spending[r.key] = r.value; });
      localStorage.setItem('gc_spend', JSON.stringify(spending)); // 오프라인 백업
    }
  } catch(e) {
    // 네트워크 실패시 localStorage에서 로드
    try { spending = JSON.parse(localStorage.getItem('gc_spend')||'{}'); } catch(e2) { spending={}; }
  }
}

async function saveSpend(key, val) {
  try {
    if(val > 0) {
      await sb.from('trip_spend').upsert({ trip_id:TRIP_ID, key:key, value:val, updated_at:new Date().toISOString() }, { onConflict:'trip_id,key' });
    } else {
      await sb.from('trip_spend').delete().eq('trip_id',TRIP_ID).eq('key',key);
    }
  } catch(e) { /* 오프라인이면 localStorage만 사용 */ }
}

// 다른 사람이 입력한 내역 자동 반영 (30초마다)
setInterval(async () => {
  await loadSpending();
  updateBudgetBar();
  if(currentTab===3) renderBudgetPage();
}, 30000);

const ICONS={food:'🍽️',spot:'🏛️',cafe:'☕',hotel:'🏨',home:'🏠'};
const DAY_COLORS={1:'#2563eb',2:'#ea580c'};
const MAX_REFUND=140000;
let PLACES,map,currentTab=1,day1Layers,day2Layers,spending={},editMode=false,dragSrcIdx=null,lastScrollY=0;

function loadPlaces(){const s=localStorage.getItem('gc_order_v9');if(s){try{PLACES=JSON.parse(s);return;}catch(e){}}PLACES=JSON.parse(JSON.stringify(DEFAULT_PLACES));}
function savePlaces(){localStorage.setItem('gc_order_v9',JSON.stringify(PLACES));}

async function init(){
  loadPlaces();
  // 먼저 localStorage에서 빠르게 로드 (깜빡임 방지)
  try{spending=JSON.parse(localStorage.getItem('gc_spend')||'{}');}catch(e){spending={};}
  map=L.map('map',{zoomControl:false}).setView([36.1,126.75],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  day1Layers=L.layerGroup();day2Layers=L.layerGroup();
  recalcTimes(PLACES);rebuildMap();day1Layers.addTo(map);switchTab(1);
  // Supabase에서 최신 데이터 로드
  await loadSpending();
  updateBudgetBar();
  if(currentTab===1||currentTab===2) renderPlaceList(currentTab);
  window.addEventListener('scroll',()=>{const f=document.getElementById('editFooter');if(editMode){f.classList.remove('hidden');return;}const c=window.scrollY;if(c>lastScrollY+10)f.classList.add('hidden');else if(c<lastScrollY-10)f.classList.remove('hidden');lastScrollY=c;});
}

function rebuildMap(){
  day1Layers.clearLayers();day2Layers.clearLayers();
  [1,2].forEach(day=>{const dp=PLACES.filter(p=>p.day===day);const coords=[];
  dp.forEach((p,i)=>{const color=DAY_COLORS[day];const num=i+1;const emoji=ICONS[p.type]||'📍';
  const icon=L.divIcon({className:'',html:`<div style="display:flex;flex-direction:column;align-items:center;pointer-events:auto;"><div style="position:relative;"><div style="background:${color};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff;">${emoji}</div><div style="position:absolute;top:-6px;right:-8px;background:${color};color:#fff;font-size:8px;font-weight:800;min-width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;font-family:'Noto Sans KR';">${num}</div>${p.refundable?'<div style="position:absolute;bottom:-3px;left:-6px;background:#16a34a;color:#fff;font-size:7px;width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #fff;font-weight:800;">₩</div>':''}</div><div style="margin-top:1px;font-size:9px;font-weight:700;color:#333;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;white-space:nowrap;font-family:'Noto Sans KR';letter-spacing:-.5px;">${p.name}</div></div>`,iconSize:[70,48],iconAnchor:[35,20]});
  const marker=L.marker([p.mapLat,p.mapLng],{icon}).bindPopup(`<div style="min-width:160px"><div style="font-weight:800;font-size:14px;margin-bottom:4px;">${num}. ${p.name}</div><div style="font-size:12px;color:#666;margin-bottom:4px;">${p.menu}</div>${p.refundable?'<div style="font-size:10px;background:#dcfce7;color:#16a34a;display:inline-block;padding:2px 8px;border-radius:10px;font-weight:800;margin-bottom:4px;">💰 환급 가능</div>':''}${p.phone?`<div style="margin-top:4px;"><a href="tel:${p.phone.replace(/[^0-9\-+]/g,'')}" style="color:#2d5a3d;font-size:12px;font-weight:600;">📞 ${p.phone}</a></div>`:''}</div>`);
  if(day===1)day1Layers.addLayer(marker);else day2Layers.addLayer(marker);coords.push([p.mapLat,p.mapLng]);});
  const poly=L.polyline(coords,{color:DAY_COLORS[day],weight:3,opacity:.5,dashArray:'8,8'});
  if(day===1)day1Layers.addLayer(poly);else day2Layers.addLayer(poly);});
}

function switchTab(tab){
  if(editMode)return;currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  if(tab===1)document.getElementById('tab1').className='tab active-day1';
  else if(tab===2)document.getElementById('tab2').className='tab active-day2';
  else document.getElementById('tab3').className='tab active-budget';
  const mapEl=document.getElementById('map'),bBar=document.getElementById('budgetBar'),pList=document.getElementById('placeList'),bPage=document.getElementById('budgetPage'),eF=document.getElementById('editFooter');
  if(tab===3){mapEl.style.display='none';bBar.style.display='none';pList.style.display='none';bPage.className='budget-page active';eF.style.display='none';renderBudgetPage();return;}
  mapEl.style.display='block';bBar.style.display='flex';pList.style.display='block';bPage.className='budget-page';eF.style.display='flex';
  map.invalidateSize();const dp=PLACES.filter(p=>p.day===tab);
  if(tab===1){if(!map.hasLayer(day1Layers))map.addLayer(day1Layers);if(map.hasLayer(day2Layers))map.removeLayer(day2Layers);}
  else{if(!map.hasLayer(day2Layers))map.addLayer(day2Layers);if(map.hasLayer(day1Layers))map.removeLayer(day1Layers);}
  map.fitBounds(L.latLngBounds(dp.map(p=>[p.mapLat,p.mapLng])).pad(0.12));
  renderPlaceList(tab);updateBudgetBar();
}

function renderPlaceList(day){
  recalcTimes(PLACES);const list=document.getElementById('placeList'),places=PLACES.filter(p=>p.day===day);let html='';
  places.forEach((p,i)=>{const isFood=p.type==='food'||p.type==='cafe';const isSpot=p.type==='spot';
  const spendVal=spending[p.id]||'';
  const gi=PLACES.indexOf(p);const ts=p._calcTime||'';const tr=(i>0&&p._travelBefore)?`🚗 ${p._travelBefore}분`:'';
  const visited=spending['visit_'+p.id]||0;

  // subItems 지출란 (예산시장 등)
  let subHtml='';
  if(!editMode && p.subItems) {
    subHtml='<div class="sub-spend">';
    p.subItems.forEach(s=>{
      const sv=spending[s.key]||'';
      subHtml+=`<div class="sub-spend-item"><label>💳 ${s.label}</label><input type="number" inputmode="numeric" placeholder="0" value="${sv}" onchange="usp('${s.key}',this.value)" onfocus="this.select()"><span class="won">원</span></div>`;
    });
    subHtml+='</div>';
  }

  // 일반 지출란 (subItems 없는 음식점/카페)
  let spendHtml='';
  if(!editMode && isFood && !p.subItems) {
    spendHtml=`<div class="spend-row"><label>💳 지출</label><input type="number" inputmode="numeric" placeholder="0" value="${spendVal}" onchange="usp('${p.id}',this.value)" onfocus="this.select()"><span class="won">원</span></div>`;
  }

  // 관광지 방문체크
  let visitHtml='';
  if(!editMode && isSpot) {
    visitHtml=`<div class="visit-check"><button class="${visited?'checked':''}" onclick="toggleVisit('${p.id}')">${visited?'✓ 방문완료':'방문 체크'}</button><span>주유비 계산에 반영</span></div>`;
  }

  html+=`<div class="time-label"><div class="dot day${day}"></div><div class="time">${ts}</div>${tr?`<div class="travel">${tr}</div>`:''}</div>
  <div class="place-card ${p.refundable?'refundable':''} ${editMode?'editable':''}" draggable="${editMode}" data-idx="${gi}"
  ${editMode?`ondragstart="ds(event,${gi})" ondragover="dov(event)" ondrop="ddp(event,${gi})" ondragend="de(event)" ontouchstart="ts2(event,${gi})" ontouchmove="tm(event)" ontouchend="te2(event,${gi})"`:''}>
  ${editMode?'<div class="drag-handle">☰</div>':''}${p.refundable?'<div class="badge">💰 환급</div>':''}
  <div class="name">${i+1}. ${p.name}</div><div class="menu">${p.menu}</div>
  <div class="meta">${p.hours?`<span>🕐 ${p.hours}</span>`:''}${p.address?`<span>📍 ${p.address}</span>`:''}${p.note?`<span>💡 ${p.note}</span>`:''}</div>
  ${!editMode&&p.phone?`<a class="phone-btn" href="tel:${p.phone.replace(/[^0-9\-+]/g,'')}">📞 ${p.phone}</a>`:''}
  ${spendHtml}${subHtml}${visitHtml}
  </div>`;});list.innerHTML=html;
}

function toggleVisit(id){
  const key='visit_'+id;
  const cur=spending[key]||0;
  if(cur){delete spending[key];saveSpend(key,0);}
  else{spending[key]=1;saveSpend(key,1);}
  localStorage.setItem('gc_spend',JSON.stringify(spending));
  renderPlaceList(currentTab);updateBudgetBar();
}

function ds(e,i){dragSrcIdx=i;e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging');}
function dov(e){e.preventDefault();}
function ddp(e,t){e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===t||PLACES[dragSrcIdx].day!==PLACES[t].day)return;const it=PLACES.splice(dragSrcIdx,1)[0];PLACES.splice(t,0,it);recalcTimes(PLACES);renderPlaceList(currentTab);rebuildMap();}
function de(e){e.target.classList.remove('dragging');dragSrcIdx=null;}
let tY=0,tI=null,tE=null;
function ts2(e,i){tI=i;tY=e.touches[0].clientY;tE=e.currentTarget;tE.classList.add('dragging');}
function tm(e){e.preventDefault();}
function te2(e){if(tE)tE.classList.remove('dragging');const d=e.changedTouches[0].clientY-tY;if(Math.abs(d)<30){tI=null;return;}const day=PLACES[tI].day,dp2=PLACES.filter(p=>p.day===day),li=dp2.indexOf(PLACES[tI]),ni=d<0?Math.max(0,li-1):Math.min(dp2.length-1,li+1);if(ni===li){tI=null;return;}const ti=PLACES.indexOf(dp2[ni]);const it=PLACES.splice(tI,1)[0];PLACES.splice(ti,0,it);recalcTimes(PLACES);renderPlaceList(currentTab);rebuildMap();tI=null;}

function toggleEdit(){editMode=!editMode;const f=document.getElementById('editFooter');if(editMode){f.innerHTML=`<span class="editing-label">✏️ 길게 눌러 드래그</span><button class="cancel-btn" onclick="cancelEdit()">취소</button><button class="save-btn" onclick="saveEdit()">저장</button>`;f.classList.remove('hidden');}else{f.innerHTML=`<button class="edit-btn" onclick="toggleEdit()">✏️ 동선 수정</button>`;}renderPlaceList(currentTab);}
function cancelEdit(){loadPlaces();editMode=false;document.getElementById('editFooter').innerHTML=`<button class="edit-btn" onclick="toggleEdit()">✏️ 동선 수정</button>`;recalcTimes(PLACES);rebuildMap();renderPlaceList(currentTab);}
function saveEdit(){savePlaces();editMode=false;document.getElementById('editFooter').innerHTML=`<button class="edit-btn" onclick="toggleEdit()">✏️ 동선 수정</button>`;recalcTimes(PLACES);rebuildMap();renderPlaceList(currentTab);updateBudgetBar();}

function usp(id,val){const n=parseInt(val)||0;if(n>0)spending[id]=n;else delete spending[id];localStorage.setItem('gc_spend',JSON.stringify(spending));saveSpend(id,n);updateBudgetBar();}
function calcRefund(t){return Math.min(t*0.7,MAX_REFUND);}

function updateBudgetBar(){
  let rt=0;PLACES.filter(p=>p.refundable).forEach(p=>{rt+=(spending[p.id]||0);});
  rt+=(spending['etc_refund']||0);
  const er=calcRefund(rt),pr=Math.min(rt/200000*100,100);
  document.getElementById('refundTotal').textContent=rt.toLocaleString()+'원';
  document.getElementById('refundDetail').textContent=`예상 환급 (70%): ${Math.round(er).toLocaleString()}원 / 최대 14만원`;
  const o=125.6-(125.6*pr/100);document.getElementById('ringProgress').setAttribute('stroke-dashoffset',o);
  document.getElementById('ringLabel').textContent=Math.round(pr)+'%';
}

// 구간별 거리(km)와 통행료(원) - 방문한 장소 기준으로 합산
const SEGMENTS = {
  1: [ // Day 1
    {from:'_start',to:'sugung',km:260,toll:16300},
    {from:'sugung',to:'seonunsa_d1',km:15,toll:0},
    {from:'seonunsa_d1',to:'joyang',km:18,toll:0},
    {from:'joyang',to:'hotel_in',km:4,toll:0},
    {from:'hotel_in',to:'barley',km:30,toll:0},
    {from:'barley',to:'geumdan',km:20,toll:0},
    {from:'geumdan',to:'oncheon1',km:20,toll:0},
  ],
  2: [ // Day 2: 고창→예산→천안→인천(동춘역)
    {from:'checkout',to:'yesan_market',km:120,toll:6500},
    {from:'yesan_market',to:'yesan_church',km:1,toll:0},
    {from:'yesan_church',to:'yedangho',km:8,toll:0},
    {from:'yedangho',to:'wisteria',km:5,toll:0},
    {from:'wisteria',to:'cheonan',km:50,toll:3800},
    {from:'cheonan',to:'_home',km:120,toll:7500},
  ]
};
const FUEL_PRICE = 1980; // 원/L
const FUEL_EFF = 15.5; // km/L (스포티지 NQ5 하이브리드)
const HOTEL_COST = 170000;
const ONCHEON_PP = 6000; // 1인당
const ONCHEON_PEOPLE = 3;

function calcTransport(dayPlaces, daySegs) {
  // 방문 여부 판단: 지출 입력 or 방문체크 or subItems 지출
  const hasAnyVisit = dayPlaces.some(p => {
    if((spending[p.id]||0) > 0) return true;
    if((spending['visit_'+p.id]||0) > 0) return true;
    if(p.subItems && p.subItems.some(s=>(spending[s.key]||0)>0)) return true;
    return false;
  });
  if(!hasAnyVisit) return { km:0, toll:0, fuelL:0, fuelCost:0 };

  let totalKm=0, totalToll=0;
  daySegs.forEach(s => { totalKm+=s.km; totalToll+=s.toll; });
  const fuelL = totalKm / FUEL_EFF;
  const fuelCost = Math.round(fuelL * FUEL_PRICE);
  return { km:totalKm, toll:totalToll, fuelL:Math.round(fuelL*10)/10, fuelCost };
}

function renderBudgetPage(){
  const pg=document.getElementById('budgetPage');let ta=0,tr=0,d1='',d2='';
  const etcRefund=spending['etc_refund']||0;
  const etcNormal=spending['etc_normal']||0;
  [1,2].forEach(d=>{let r='';PLACES.filter(p=>p.day===d&&(p.type==='food'||p.type==='cafe')).forEach(p=>{
    if(p.subItems){
      let subTotal=0;
      p.subItems.forEach(s=>{subTotal+=(spending[s.key]||0);});
      ta+=subTotal;if(p.refundable)tr+=subTotal;
      if(subTotal>0){
        r+=`<div class="budget-row"><div class="label" style="font-weight:700">${p.name}</div><div class="value">${subTotal.toLocaleString()}원</div></div>`;
        p.subItems.forEach(s=>{const sv=spending[s.key]||0;if(sv>0)r+=`<div class="budget-row"><div class="label" style="padding-left:12px;font-size:12px;color:#999;">└ ${s.label}</div><div class="value" style="font-size:12px;color:#999;">${sv.toLocaleString()}원</div></div>`;});
      }
    } else {
      const v=spending[p.id]||0;ta+=v;if(p.refundable)tr+=v;
      if(v>0)r+=`<div class="budget-row"><div class="label">${p.name}${p.refundable?'<span class="refund-badge">환급</span>':''}</div><div class="value">${v.toLocaleString()}원</div></div>`;
    }
  });if(d===1)d1=r;else d2=r;});
  tr+=etcRefund; ta+=etcRefund+etcNormal;
  const er=calcRefund(tr);

  // 교통비 계산
  const t1=calcTransport(PLACES.filter(p=>p.day===1), SEGMENTS[1]);
  const t2=calcTransport(PLACES.filter(p=>p.day===2), SEGMENTS[2]);
  const totalKm=t1.km+t2.km, totalToll=t1.toll+t2.toll, totalFuel=t1.fuelCost+t2.fuelCost;
  const totalTransport=totalToll+totalFuel;

  // 숙박비
  const oncheonCost = ONCHEON_PP * ONCHEON_PEOPLE;
  const totalAccom = HOTEL_COST + oncheonCost;

  // 총 지출
  const grandTotal = ta + totalTransport + totalAccom;

  pg.innerHTML=`<div class="total-bar"><div style="font-size:12px;color:#a8d4b8;margin-bottom:4px;">예상 환급 (청년 70%)</div><div class="big">${Math.round(er).toLocaleString()}원</div><div class="sub">환급 가능 지출 ${tr.toLocaleString()}원 × 70% (최대 14만원)</div></div>
  <div class="budget-section" style="margin-top:12px;"><h3>🔵 1일차 고창</h3>${d1||'<div style="font-size:13px;color:#999;padding:8px 0;">아직 입력된 지출이 없어요</div>'}</div>
  <div class="budget-section"><h3>🟠 2일차 예산</h3>${d2||'<div style="font-size:13px;color:#999;padding:8px 0;">아직 입력된 지출이 없어요</div>'}</div>
  <div class="budget-section"><h3>🛒 기타 지출</h3>
  <div class="budget-row" style="border-bottom:none;flex-wrap:wrap;gap:8px;">
    <div style="flex:1;min-width:140px;"><div style="font-size:12px;color:#16a34a;font-weight:600;margin-bottom:4px;">💰 환급 가능 (시장 등)</div><div class="spend-row" style="margin:0;padding:0;border:none;"><input type="number" inputmode="numeric" placeholder="0" value="${etcRefund||''}" onchange="usp('etc_refund',this.value);renderBudgetPage();" onfocus="this.select()" style="width:120px"><span class="won">원</span></div></div>
    <div style="flex:1;min-width:140px;"><div style="font-size:12px;color:#888;font-weight:600;margin-bottom:4px;">일반 지출</div><div class="spend-row" style="margin:0;padding:0;border:none;"><input type="number" inputmode="numeric" placeholder="0" value="${etcNormal||''}" onchange="usp('etc_normal',this.value);renderBudgetPage();" onfocus="this.select()" style="width:120px"><span class="won">원</span></div></div>
  </div></div>
  <div class="budget-section"><h3>🚗 교통비</h3>
  <div style="font-size:10px;color:#bbb;margin-bottom:8px;">스포티지 NQ5 HEV · 연비 15.5km/L · 유가 1,980원/L</div>
  <div class="budget-row"><div class="label">1일차 주행 (${t1.km}km)</div><div class="value">${t1.fuelCost.toLocaleString()}원</div></div>
  <div class="budget-row"><div class="label">2일차 주행 (${t2.km}km)</div><div class="value">${t2.fuelCost.toLocaleString()}원</div></div>
  <div class="budget-row"><div class="label">통행료 합계</div><div class="value">${totalToll.toLocaleString()}원</div></div>
  <div class="budget-row" style="border-top:1.5px solid #e8e2da;padding-top:10px;"><div class="label" style="font-weight:700;">교통비 소계</div><div class="value">${totalTransport.toLocaleString()}원</div></div>
  </div>
  <div class="budget-section"><h3>🏨 숙박</h3>
  <div class="budget-row"><div class="label">웰파크호텔 1박</div><div class="value">${HOTEL_COST.toLocaleString()}원</div></div>
  <div class="budget-row"><div class="label">온천 (${ONCHEON_PP.toLocaleString()}원 × ${ONCHEON_PEOPLE}명)</div><div class="value">${oncheonCost.toLocaleString()}원</div></div>
  <div class="budget-row" style="border-top:1.5px solid #e8e2da;padding-top:10px;"><div class="label" style="font-weight:700;">숙박 소계</div><div class="value">${totalAccom.toLocaleString()}원</div></div>
  </div>
  <div class="budget-section"><h3>📊 최종 요약</h3>
  <div class="budget-row"><div class="label">식비 합계</div><div class="value">${ta.toLocaleString()}원</div></div>
  <div class="budget-row"><div class="label">교통비</div><div class="value">${totalTransport.toLocaleString()}원</div></div>
  <div class="budget-row"><div class="label">숙박비</div><div class="value">${totalAccom.toLocaleString()}원</div></div>
  <div class="budget-row" style="border-top:2px solid #2d5a3d;padding-top:10px;"><div class="label" style="font-weight:800;font-size:14px;">총 지출</div><div class="value" style="font-size:18px;">${grandTotal.toLocaleString()}원</div></div>
  <div class="budget-row"><div class="label" style="color:#16a34a;">예상 환급</div><div class="value" style="color:#16a34a;">-${Math.round(er).toLocaleString()}원</div></div>
  <div class="budget-row" style="border-top:2px solid #16a34a;padding-top:10px;"><div class="label" style="font-weight:800;font-size:14px;color:#2d5a3d;">실질 부담</div><div class="value" style="font-size:18px;color:#2d5a3d;">${(grandTotal-Math.round(er)).toLocaleString()}원</div></div>
  </div>
  <div style="text-align:center;padding:16px;"><button onclick="if(confirm('모든 지출 기록을 초기화할까요?')){spending={};localStorage.removeItem('gc_spend');sb.from('trip_spend').delete().eq('trip_id',TRIP_ID).then(()=>{});switchTab(3);}" style="background:none;border:1px solid #ccc;border-radius:8px;padding:8px 20px;font-size:12px;color:#999;cursor:pointer;font-family:'Noto Sans KR';">지출 기록 초기화</button>
  <button onclick="if(confirm('순서를 기본값으로 되돌릴까요?')){localStorage.removeItem('gc_order_v9');loadPlaces();recalcTimes(PLACES);rebuildMap();switchTab(1);}" style="background:none;border:1px solid #ccc;border-radius:8px;padding:8px 20px;font-size:12px;color:#999;cursor:pointer;font-family:'Noto Sans KR';margin-top:8px;">순서 초기화</button></div>`;
}
document.addEventListener('DOMContentLoaded',init);
</script>
