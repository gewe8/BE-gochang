<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:#f5f0eb; color:#2d2a26; overflow-x:hidden; }
.header { background:linear-gradient(135deg,#1a3a2a 0%,#2d5a3d 100%); color:#fff; padding:16px 20px 12px; position:relative; z-index:1000; }

.header .subtitle { font-size:12px; color:#a8d4b8; margin-top:2px; }

.tab { flex:1; padding:12px 0; text-align:center; font-size:14px; font-weight:600; cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; color:#999; }
.tab.active-day1 { color:#2563eb; border-bottom-color:#2563eb; }
.tab.active-day2 { color:#ea580c; border-bottom-color:#ea580c; }

#map { width:100%; height:45vh; min-height:300px; }
.budget-bar { background:#fff; padding:12px 20px; border-bottom:1px solid #e8e2da; display:flex; align-items:center; gap:12px; }
.budget-ring { width:48px; height:48px; position:relative; flex-shrink:0; }
.budget-ring svg { transform:rotate(-90deg); }
.budget-ring .label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10px; font-weight:800; color:#16a34a; }
.budget-info { flex:1; }
.budget-info .title { font-size:11px; color:#888; }
.budget-info .amount { font-size:18px; font-weight:800; color:#2d2a26; }
.budget-info .detail { font-size:11px; color:#16a34a; margin-top:2px; }
.place-list { padding:0 16px 80px; }
.time-label { display:flex; align-items:center; gap:8px; padding:16px 0 4px; }
.time-label .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.time-label .dot.day1 { background:#2563eb; }
.time-label .dot.day2 { background:#ea580c; }
.time-label .time { font-size:12px; font-weight:600; color:#888; }
.time-label .travel { font-size:10px; color:#bbb; margin-left:auto; }
.place-card { background:#fff; border-radius:14px; padding:16px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); position:relative; overflow:hidden; transition:transform .15s, box-shadow .15s; }
.place-card.refundable { border-left:4px solid #16a34a; }
.place-card.dragging { opacity:0.5; transform:scale(0.97); box-shadow:0 4px 16px rgba(0,0,0,.15); }
.place-card .drag-handle { display:none; position:absolute; left:4px; top:50%; transform:translateY(-50%); font-size:18px; color:#ccc; cursor:grab; padding:8px; }
.place-card.editable .drag-handle { display:block; }
.place-card.editable { padding-left:36px; }
.place-card .badge { position:absolute; top:12px; right:12px; background:#dcfce7; color:#16a34a; font-size:10px; font-weight:800; padding:3px 8px; border-radius:20px; }
.place-card .name { font-size:16px; font-weight:800; margin-bottom:4px; }
.place-card .menu { font-size:13px; color:#666; margin-bottom:6px; }
.place-card .meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.place-card .meta span { font-size:11px; color:#888; background:#f5f0eb; padding:2px 8px; border-radius:8px; }
.place-card .phone-btn { display:inline-flex; align-items:center; gap:4px; background:#2d5a3d; color:#fff; font-size:12px; font-weight:600; padding:6px 14px; border-radius:20px; text-decoration:none; }
.place-card .phone-btn:active { background:#1a3a2a; }
.spend-row { display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px dashed #e8e2da; }
.spend-row label { font-size:12px; color:#888; white-space:nowrap; }
.spend-row input { width:100px; border:1.5px solid #d4cfc7; border-radius:8px; padding:6px 10px; font-size:14px; font-family:'Noto Sans KR'; text-align:right; outline:none; }

/* Edit footer - 하단 고정, 스크롤 올리면 숨김 */

.edit-footer .cancel-btn { background:#e8e2da; color:#666; border:none; padding:8px 16px; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Noto Sans KR'; }

.budget-page { padding:16px; display:none; }

    lat:35.4331867, lng:126.7065134, mapLat:35.440, mapLng:126.690, refundable:true, type:'food',

    duration:90, travelAfter:0 },

    lat:35.4314742, lng:126.74183610, mapLat:35.425, mapLng:126.745, refundable:false, type:'hotel',
    duration:10, travelAfter:20 },
  { id:'mungchi', day:2, startH:9, startM:30, name:'뭉치네', menu:'산채비빔밥 · 파전', phone:'063-562-5878', hours:'11~21시',
    lat:35.504, lng:126.597, mapLat:35.510, mapLng:126.600, refundable:true, type:'food',
    duration:40, travelAfter:5 },
  { id:'seonunsa', day:2, startH:10, startM:30, name:'선운사', menu:'산책 약 1시간 (입장 3,000원)', phone:'063-561-1422', hours:'09~17시',
    lat:35.4969385, lng:126.57822549, mapLat:35.498, mapLng:126.580, refundable:false, type:'spot',
    duration:60, travelAfter:10 },
  { id:'yeondawon', day:2, startH:12, startM:0, name:'연다원', menu:'녹차밭+저수지 뷰 · 크루아상', phone:'063-561-4443', hours:'월 영업 확인 필요',
    lat:35.4914574, lng:126.62796700, mapLat:35.491, mapLng:126.628, refundable:false, type:'cafe',
    duration:40, travelAfter:20 },
  { id:'myeonok', day:2, startH:13, startM:30, name:'고창면옥', menu:'냉면 · 갈비탕 · 만두', phone:'063-561-1007', hours:'11~20시 연중무휴',
    lat:35.4308985, lng:126.72698039, mapLat:35.438, mapLng:126.727, refundable:false, type:'food',
    duration:50, travelAfter:5 },
  { id:'narae', day:2, startH:15, startM:0, name:'나래궁', menu:'짬짜면 · 전통시장', phone:'063-561-0957', hours:'11~19시 / 금 휴무',
    lat:35.4332323, lng:126.6968035, mapLat:35.428, mapLng:126.694, refundable:true, type:'food',
    duration:40, travelAfter:0 },
];

// 장소 간 이동시간 매트릭스 (id→id, 분)
const TRAVEL = {
  'sugung→seonunsa_d1':20,'seonunsa_d1→sugung':20,
  'sugung→hotel_in':25,'hotel_in→sugung':25,
  'sugung→geumdan':5,'geumdan→sugung':5,
  'sugung→barley':35,'barley→sugung':35,
  'seonunsa_d1→hotel_in':20,'hotel_in→seonunsa_d1':20,
  'seonunsa_d1→joyang':25,'joyang→seonunsa_d1':25,
  'hotel_in→joyang':5,'joyang→hotel_in':5,
  'hotel_in→eupseong':5,'eupseong→hotel_in':5,
  'hotel_in→sundubu':5,'sundubu→hotel_in':5,
  'hotel_in→oncheon1':0,'oncheon1→hotel_in':0,
  'joyang→geumdan':25,'geumdan→joyang':25,
  'joyang→eupseong':3,'eupseong→joyang':3,
  'joyang→sundubu':3,'sundubu→joyang':3,
  'geumdan→barley':25,'barley→geumdan':25,
  'geumdan→seonunsa_d1':15,'seonunsa_d1→geumdan':15,
  'barley→eupseong':35,'eupseong→barley':35,
  'barley→hotel_in':40,'hotel_in→barley':40,
  'eupseong→sundubu':3,'sundubu→eupseong':3,
  'sundubu→oncheon1':5,'oncheon1→sundubu':5,
  'eupseong→oncheon1':5,'oncheon1→eupseong':5,
  // Day 2
  'oncheon2→checkout':0,'checkout→oncheon2':0,
  'checkout→mungchi':20,'mungchi→checkout':20,
  'mungchi→seonunsa':5,'seonunsa→mungchi':5,
  'seonunsa→yeondawon':10,'yeondawon→seonunsa':10,
  'yeondawon→myeonok':20,'myeonok→yeondawon':20,
  'myeonok→narae':5,'narae→myeonok':5,
  'checkout→seonunsa':20,'seonunsa→checkout':20,
  'checkout→yeondawon':25,'yeondawon→checkout':25,
  'mungchi→yeondawon':15,'yeondawon→mungchi':15,
  'mungchi→myeonok':25,'myeonok→mungchi':25,
  'seonunsa→myeonok':25,'myeonok→seonunsa':25,
  'seonunsa→narae':25,'narae→seonunsa':25,
  'yeondawon→narae':15,'narae→yeondawon':15,
};

function getTravelMin(fromId, toId) {
  return TRAVEL[fromId+'→'+toId] || 15; // 모르면 15분 기본
}

function recalcTimes(places) {
  [1,2].forEach(day => {
    const dp = places.filter(p=>p.day===day);
    if(dp.length===0) return;
    // 첫 장소는 원래 시간 유지
    let curMin = dp[0].startH*60 + dp[0].startM;
    dp[0]._calcTime = formatTime(curMin);
    dp[0]._travelAfter = null;
    for(let i=1; i<dp.length; i++) {
      const prev = dp[i-1];
      const travel = getTravelMin(prev.id, dp[i].id);
      curMin += prev.duration + travel;
      dp[i]._calcTime = formatTime(curMin);
      dp[i]._travelBefore = travel;
    }
  });
}

function formatTime(totalMin) {
  const h = Math.floor(totalMin/60), m = totalMin%60;
  return `${h}:${m.toString().padStart(2,'0')}`;
}

const ICONS = { food:'🍽️', spot:'🏛️', cafe:'☕', hotel:'🏨' };
const DAY_COLORS = { 1:'#2563eb', 2:'#ea580c' };
const MAX_REFUND = 140000;

let PLACES, map, currentTab=1, day1Layers, day2Layers, spending={};
let editMode=false, dragSrcIdx=null;
let lastScrollY=0;

function loadPlaces() {
  const saved = localStorage.getItem('gc_order');
  if(saved) { try { PLACES = JSON.parse(saved); return; } catch(e){} }
  PLACES = JSON.parse(JSON.stringify(DEFAULT_PLACES));
}
function savePlaces() { localStorage.setItem('gc_order', JSON.stringify(PLACES)); }

function init() {
  loadPlaces();
  try { spending = JSON.parse(localStorage.getItem('gc_spend')||'{}'); } catch(e) { spending={}; }
  map = L.map('map',{zoomControl:false}).setView([35.46,126.65],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  day1Layers = L.layerGroup();
  day2Layers = L.layerGroup();
  recalcTimes(PLACES);
  rebuildMap();
  day1Layers.addTo(map);
  switchTab(1);

  // 스크롤 감지: 아래로 스크롤하면 edit footer 숨김
  window.addEventListener('scroll', () => {
    const footer = document.getElementById('editFooter');
    if(editMode) { footer.classList.remove('hidden'); return; }
    const curY = window.scrollY;
    if(curY > lastScrollY + 10) footer.classList.add('hidden');
    else if(curY < lastScrollY - 10) footer.classList.remove('hidden');
    lastScrollY = curY;
  });
}

function rebuildMap() {
  day1Layers.clearLayers();
  day2Layers.clearLayers();
  [1,2].forEach(day => {
    const dayPlaces = PLACES.filter(p=>p.day===day);
    const coords = [];
    dayPlaces.forEach((p,i) => {
      const color = DAY_COLORS[day];
      const num = i+1;
      const emoji = ICONS[p.type]||'📍';
      const icon = L.divIcon({
        className:'',
        html:`<div style="display:flex;flex-direction:column;align-items:center;pointer-events:auto;">
          <div style="position:relative;">
            <div style="background:${color};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff;">${emoji}</div>
            <div style="position:absolute;top:-6px;right:-8px;background:${color};color:#fff;font-size:8px;font-weight:800;min-width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;font-family:'Noto Sans KR';">${num}</div>
            ${p.refundable?'<div style="position:absolute;bottom:-3px;left:-6px;background:#16a34a;color:#fff;font-size:7px;width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #fff;font-weight:800;">₩</div>':''}
          </div>
          <div style="margin-top:1px;font-size:9px;font-weight:700;color:#333;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff,0 0 3px #fff,1px 1px 2px #fff;white-space:nowrap;font-family:'Noto Sans KR';letter-spacing:-0.5px;">${p.name}</div>
        </div>`,
        iconSize:[70,48], iconAnchor:[35,20]
      });
      const marker = L.marker([p.mapLat,p.mapLng],{icon}).bindPopup(`
        <div style="min-width:160px">
          <div style="font-weight:800;font-size:14px;margin-bottom:4px;">${num}. ${p.name}</div>
          <div style="font-size:12px;color:#666;margin-bottom:4px;">${p.menu}</div>
          ${p.refundable?'<div style="font-size:10px;background:#dcfce7;color:#16a34a;display:inline-block;padding:2px 8px;border-radius:10px;font-weight:800;margin-bottom:4px;">💰 환급 가능</div>':''}
          ${p.phone?`<div style="margin-top:4px;"><a href="tel:${p.phone.replace(/[^0-9\-+]/g,'')}" style="color:#2d5a3d;font-size:12px;font-weight:600;">📞 ${p.phone}</a></div>`:''}
        </div>
      `);
      if(day===1) day1Layers.addLayer(marker); else day2Layers.addLayer(marker);
      coords.push([p.mapLat,p.mapLng]);
    });
    const polyline = L.polyline(coords,{color:DAY_COLORS[day],weight:3,opacity:0.5,dashArray:'8,8'});
    if(day===1) day1Layers.addLayer(polyline); else day2Layers.addLayer(polyline);
  });
}

function switchTab(tab) {
  if(editMode) return;
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  if(tab===1) document.getElementById('tab1').className='tab active-day1';
  else if(tab===2) document.getElementById('tab2').className='tab active-day2';
  else document.getElementById('tab3').className='tab active-budget';
  const mapEl=document.getElementById('map'),budgetBar=document.getElementById('budgetBar'),placeList=document.getElementById('placeList'),budgetPage=document.getElementById('budgetPage');
  const editFooter=document.getElementById('editFooter');
  if(tab===3){mapEl.style.display='none';budgetBar.style.display='none';placeList.style.display='none';budgetPage.className='budget-page active';editFooter.style.display='none';renderBudgetPage();return;}
  mapEl.style.display='block';budgetBar.style.display='flex';placeList.style.display='block';budgetPage.className='budget-page';editFooter.style.display='flex';
  map.invalidateSize();
  const dayPlaces=PLACES.filter(p=>p.day===tab);
  if(tab===1){if(!map.hasLayer(day1Layers))map.addLayer(day1Layers);if(map.hasLayer(day2Layers))map.removeLayer(day2Layers);}
  else{if(!map.hasLayer(day2Layers))map.addLayer(day2Layers);if(map.hasLayer(day1Layers))map.removeLayer(day1Layers);}
  map.fitBounds(L.latLngBounds(dayPlaces.map(p=>[p.mapLat,p.mapLng])).pad(0.12));
  renderPlaceList(tab);updateBudgetBar();
}

function renderPlaceList(day) {
  recalcTimes(PLACES);
  const list=document.getElementById('placeList'),places=PLACES.filter(p=>p.day===day);
  let html='';
  places.forEach((p,i) => {
    const isFood=p.type==='food'||p.type==='cafe',spendVal=spending[p.id]||'';
    const globalIdx = PLACES.indexOf(p);
    const timeStr = p._calcTime || p.time;
    const travelStr = (i>0 && p._travelBefore) ? `🚗 ${p._travelBefore}분` : '';
    html+=`<div class="time-label"><div class="dot day${day}"></div><div class="time">${timeStr}</div>${travelStr?`<div class="travel">${travelStr}</div>`:''}</div>
      <div class="place-card ${p.refundable?'refundable':''} ${editMode?'editable':''}" draggable="${editMode}" data-idx="${globalIdx}"
        ${editMode?`ondragstart="dragStart(event,${globalIdx})" ondragover="dragOver(event)" ondrop="drop(event,${globalIdx})" ondragend="dragEnd(event)"
        ontouchstart="tStart(event,${globalIdx})" ontouchmove="tMove(event)" ontouchend="tEnd(event,${globalIdx})"`:''}>
        ${editMode?'<div class="drag-handle">☰</div>':''}
        ${p.refundable?'<div class="badge">💰 환급</div>':''}
        <div class="name">${i+1}. ${p.name}</div>
        <div class="menu">${p.menu}</div>
        <div class="meta">${p.hours?`<span>🕐 ${p.hours}</span>`:''}${p.address?`<span>📍 ${p.address}</span>`:''}${p.note?`<span>💡 ${p.note}</span>`:''}</div>
        ${!editMode&&p.phone?`<a class="phone-btn" href="tel:${p.phone.replace(/[^0-9\-+]/g,'')}">📞 ${p.phone}</a>`:''}
        ${!editMode&&isFood?`<div class="spend-row"><label>💳 지출</label><input type="number" inputmode="numeric" placeholder="0" value="${spendVal}" onchange="updateSpend('${p.id}',this.value)" onfocus="this.select()"><span class="won">원</span></div>`:''}
      </div>`;
  });
  list.innerHTML=html;
}

// Desktop drag
function dragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging');}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function drop(e,targetIdx){
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===targetIdx) return;
  if(PLACES[dragSrcIdx].day!==PLACES[targetIdx].day) return;
  const item=PLACES.splice(dragSrcIdx,1)[0];
  PLACES.splice(targetIdx,0,item);
  recalcTimes(PLACES);
  renderPlaceList(currentTab);
  rebuildMap();
}
function dragEnd(e){e.target.classList.remove('dragging');dragSrcIdx=null;}

// Mobile touch
let tY=0,tI=null,tE=null;
function tStart(e,idx){tI=idx;tY=e.touches[0].clientY;tE=e.currentTarget;tE.classList.add('dragging');}
function tMove(e){e.preventDefault();}
function tEnd(e,idx){
  if(tE)tE.classList.remove('dragging');
  const diff=e.changedTouches[0].clientY-tY;
  if(Math.abs(diff)<30){tI=null;return;}
  const day=PLACES[tI].day;
  const dp=PLACES.filter(p=>p.day===day);
  const li=dp.indexOf(PLACES[tI]);
  const ni=diff<0?Math.max(0,li-1):Math.min(dp.length-1,li+1);
  if(ni===li){tI=null;return;}
  const ti=PLACES.indexOf(dp[ni]);
  const item=PLACES.splice(tI,1)[0];
  PLACES.splice(ti,0,item);
  recalcTimes(PLACES);
  renderPlaceList(currentTab);
  rebuildMap();
  tI=null;
}

function toggleEdit() {
  editMode=!editMode;
  const footer=document.getElementById('editFooter');
  if(editMode) {
    footer.innerHTML=`<span class="editing-label">✏️ 길게 눌러 드래그</span><button class="cancel-btn" onclick="cancelEdit()">취소</button><button class="save-btn" onclick="saveEdit()">저장</button>`;
    footer.classList.remove('hidden');
  } else {
    footer.innerHTML=`<button class="edit-btn" onclick="toggleEdit()">✏️ 동선 수정</button>`;
  }
  renderPlaceList(currentTab);
}
function cancelEdit() {
  loadPlaces(); editMode=false;
  const footer=document.getElementById('editFooter');
  footer.innerHTML=`<button class="edit-btn" onclick="toggleEdit()">✏️ 동선 수정</button>`;
  recalcTimes(PLACES); rebuildMap(); renderPlaceList(currentTab);
}
function saveEdit() {
  savePlaces(); editMode=false;
  const footer=document.getElementById('editFooter');
  footer.innerHTML=`<button class="edit-btn" onclick="toggleEdit()">✏️ 동선 수정</button>`;
  recalcTimes(PLACES); rebuildMap(); renderPlaceList(currentTab); updateBudgetBar();
}

function updateSpend(id,val){const num=parseInt(val)||0;if(num>0)spending[id]=num;else delete spending[id];localStorage.setItem('gc_spend',JSON.stringify(spending));updateBudgetBar();}
function calcRefund(total){return Math.min(total*0.7,MAX_REFUND);}

function updateBudgetBar(){
  let refundableTotal=0;
  PLACES.filter(p=>p.refundable).forEach(p=>{refundableTotal+=(spending[p.id]||0);});
  const expectedRefund=calcRefund(refundableTotal),progress=Math.min(refundableTotal/200000*100,100);
  document.getElementById('refundTotal').textContent=refundableTotal.toLocaleString()+'원';
  document.getElementById('refundDetail').textContent=`예상 환급 (70%): ${Math.round(expectedRefund).toLocaleString()}원 / 최대 14만원`;
  const offset=125.6-(125.6*progress/100);
  document.getElementById('ringProgress').setAttribute('stroke-dashoffset',offset);
  document.getElementById('ringLabel').textContent=Math.round(progress)+'%';
}

function renderBudgetPage(){
  const page=document.getElementById('budgetPage');
  let totalAll=0,totalRefundable=0,day1Html='',day2Html='';
  [1,2].forEach(day=>{
    let rows='';
    PLACES.filter(p=>p.day===day&&(p.type==='food'||p.type==='cafe')).forEach(p=>{
      const val=spending[p.id]||0;totalAll+=val;if(p.refundable)totalRefundable+=val;
      if(val>0)rows+=`<div class="budget-row"><div class="label">${p.name}${p.refundable?'<span class="refund-badge">환급</span>':''}</div><div class="value">${val.toLocaleString()}원</div></div>`;
    });
    if(day===1)day1Html=rows;else day2Html=rows;
  });
  const expectedRefund=calcRefund(totalRefundable);
  page.innerHTML=`
    <div class="total-bar">
      <div style="font-size:12px;color:#a8d4b8;margin-bottom:4px;">예상 환급 (청년 70%)</div>
      <div class="big">${Math.round(expectedRefund).toLocaleString()}원</div>
      <div class="sub">환급 가능 지출 ${totalRefundable.toLocaleString()}원 × 70% (최대 14만원)</div>
    </div>
    <div class="budget-section" style="margin-top:12px;"><h3>🔵 1일차 (일)</h3>${day1Html||'<div style="font-size:13px;color:#999;padding:8px 0;">아직 입력된 지출이 없어요</div>'}</div>
    <div class="budget-section"><h3>🟠 2일차 (월)</h3>${day2Html||'<div style="font-size:13px;color:#999;padding:8px 0;">아직 입력된 지출이 없어요</div>'}</div>
    <div class="budget-section"><h3>📊 요약</h3>
      <div class="budget-row"><div class="label">총 식비</div><div class="value">${totalAll.toLocaleString()}원</div></div>
      <div class="budget-row"><div class="label">환급 가능 가게 합계</div><div class="value" style="color:#16a34a">${totalRefundable.toLocaleString()}원</div></div>
      <div class="budget-row"><div class="label">예상 환급 (70%, 최대 14만)</div><div class="value" style="color:#16a34a">${Math.round(expectedRefund).toLocaleString()}원</div></div>
      <div class="budget-row"><div class="label">실질 식비 (총-환급)</div><div class="value">${(totalAll-Math.round(expectedRefund)).toLocaleString()}원</div></div>
    </div>
    <div style="text-align:center;padding:16px;">
      <button onclick="if(confirm('모든 지출 기록을 초기화할까요?')){spending={};localStorage.removeItem('gc_spend');switchTab(3);}" style="background:none;border:1px solid #ccc;border-radius:8px;padding:8px 20px;font-size:12px;color:#999;cursor:pointer;font-family:'Noto Sans KR';">지출 기록 초기화</button>
      <button onclick="if(confirm('순서를 기본값으로 되돌릴까요?')){localStorage.removeItem('gc_order');loadPlaces();recalcTimes(PLACES);rebuildMap();switchTab(1);}" style="background:none;border:1px solid #ccc;border-radius:8px;padding:8px 20px;font-size:12px;color:#999;cursor:pointer;font-family:'Noto Sans KR';margin-top:8px;">순서 초기화</button>
    </div>`;
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
