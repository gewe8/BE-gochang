function getTravelMin(a,b){return TRAVEL[a+'вЖТ'+b]||15;}
function recalcTimes(P){
  [1,2].forEach(d=>{const dp=P.filter(p=>p.day===d);if(!dp.length)return;
  let m=dp[0].startH*60+dp[0].startM;dp[0]._calcTime=fmt(m);dp[0]._travelBefore=null;
  for(let i=1;i<dp.length;i++){const prev=dp[i-1];m+=prev.duration+getTravelMin(prev.id,dp[i].id);dp[i]._calcTime=fmt(m);dp[i]._travelBefore=getTravelMin(prev.id,dp[i].id);}});
}

async function loadSpending() {
  try {
    const { data, error } = await sb.from('trip_spend').select('key,value').eq('trip_id', TRIP_ID);
    if(!error && data) {
      spending = {};
      data.forEach(r => { spending[r.key] = r.value; });
      localStorage.setItem('gc_spend', JSON.stringify(spending)); // мШ§нФДлЭЉмЭЄ л∞±мЧЕ
    }
  } catch(e) {

    try { spending = JSON.parse(localStorage.getItem('gc_spend')||'{}'); } catch(e2) { spending={}; }
  }
}

async function saveSpend(key, val) {
  try {
    if(val > 0) {
      await sb.from('trip_spend').upsert({ trip_id:TRIP_ID, key:key, value:val, updated_at:new Date().toISOString() }, { onConflict:'trip_id,key' });
    } else {
      await sb.from('trip_spend').delete().eq('trip_id',TRIP_ID).eq('key',key);

}

function switchTab(tab){
  if(editMode)return;currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  if(tab===1)document.getElementById('tab1').className='tab active-day1';
  else if(tab===2)document.getElementById('tab2').className='tab active-day2';
  else document.getElementById('tab3').className='tab active-budget';
  const mapEl=document.getElementById('map'),bBar=document.getElementById('budgetBar'),pList=document.getElementById('placeList'),bPage=document.getElementById('budgetPage'),eF=document.getElementById('editFooter');
  if(tab===3){mapEl.style.display='none';bBar.style.display='none';pList.style.display='none';bPage.className='budget-page active';eF.style.display='none';renderBudgetPage();return;}
  mapEl.style.display='block';bBar.style.display='flex';pList.style.display='block';bPage.className='budget-page';eF.style.display='flex';
  map.invalidateSize();const dp=PLACES.filter(p=>p.day===tab);
  if(tab===1){if(!map.hasLayer(day1Layers))map.addLayer(day1Layers);if(map.hasLayer(day2Layers))map.removeLayer(day2Layers);}
  else{if(!map.hasLayer(day2Layers))map.addLayer(day2Layers);if(map.hasLayer(day1Layers))map.removeLayer(day1Layers);}
  map.fitBounds(L.latLngBounds(dp.map(p=>[p.mapLat,p.mapLng])).pad(0.12));
  renderPlaceList(tab);updateBudgetBar();
}

function ddp(e,t){e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===t||PLACES[dragSrcIdx].day!==PLACES[t].day)return;const it=PLACES.splice(dragSrcIdx,1)[0];PLACES.splice(t,0,it);recalcTimes(PLACES);renderPlaceList(currentTab);rebuildMap();}

const FUEL_PRICE = 1980; // мЫР/L
const FUEL_EFF = 15.5; // km/L (мК§нПђнЛ∞мІА NQ5 нХШмЭілЄМл¶ђлУЬ)
const HOTEL_COST = 170000;
const ONCHEON_PP = 6000; // 1мЭЄлЛє
const ONCHEON_PEOPLE = 3;

function calcTransport(dayPlaces, daySegs) {
  // мЭМмЛЭм†Р/мєінОШмЧР мІАмґЬмЭі мЮЕл†•лРЬ к≥≥мЭі нХШлВШлЭЉлПД мЮИмЦімХЉ нХілЛє мЭЉм∞® кµРнЖµлєД к≥ДмВ∞
  const hasAnySpend = dayPlaces.some(p => (spending[p.id]||0) > 0);
  if(!hasAnySpend) return { km:0, toll:0, fuelL:0, fuelCost:0 };

  // мІАмґЬмЭі мЮЕл†•лРЬ к∞АмЮ• лІИмІАлІЙ мЭМмЛЭм†Р/мєінОШкєМмІАмЭШ кµђк∞ДлІМ нХ©мВ∞
  // (кіАкіСмІАлКФ лПЩмД†мГБ мІАлВШк∞Ал©і мЮРлПЩ нПђнХ®)
  let lastVisitedIdx = -1;
  dayPlaces.forEach((p,i) => {
    if((spending[p.id]||0) > 0) lastVisitedIdx = i;
  });
  // кіАкіСмІА/нШЄнЕФ/нЩИмЭА лђім°∞к±і нПђнХ®мЭілѓАл°Ь лІИмІАлІЙ кіАкіСмІАлПД м≤інБђ
  dayPlaces.forEach((p,i) => {
    if(p.type==='spot'||p.type==='home') {
      if(i <= lastVisitedIdx || (lastVisitedIdx >= 0 && i > lastVisitedIdx)) lastVisitedIdx = Math.max(lastVisitedIdx, i);
    }
  });

  let totalKm=0, totalToll=0;
  daySegs.forEach(s => { totalKm+=s.km; totalToll+=s.toll; });
  const fuelL = totalKm / FUEL_EFF;
  const fuelCost = Math.round(fuelL * FUEL_PRICE);
  return { km:totalKm, toll:totalToll, fuelL:Math.round(fuelL*10)/10, fuelCost };
}
